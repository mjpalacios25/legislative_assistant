- name: question_100
  inputs: In 2023, if a regional accrediting organization in Arizona is accrediting
    a bureau-Funded school, which entity must approve the assessments they adopt?
  metadata:
    chunk_id: '50'
  expected_output:
  - '(k)Special rule with respect to bureau-Funded schoolsIn determining the assessments
    to be used by each school operated or funded by the Bureau of Indian Education
    receiving funds under this part, the following shall apply until the requirements
    of section 8204(c) have been met: (1)Each such school that is accredited by the
    State in which it is operating shall use the assessments and other academic indicators
    the State has developed and implemented to meet the requirements of this section,
    or such other appropriate assessment and academic indicators as approved by the
    Secretary of the Interior. (2)Each such school that is accredited by a regional
    accrediting organization (in consultation with and with the approval of the Secretary
    of the Interior, and consistent with assessments and academic indicators adopted
    by other schools in the same State or region) shall adopt an appropriate assessment
    and other academic indicators that meet the requirements of this section. (3)Each
    such school that is accredited by a tribal accrediting agency or tribal division
    of education shall use an assessment and other academic indicators developed by
    such agency or division, except that the Secretary of the Interior shall ensure
    that such assessment and academic indicators meet the requirements of this section.'
