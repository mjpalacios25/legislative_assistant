    \ A for each fiscal year to carry out this section.\n(B)ConsultationA State educational\
    \ agency shall consult under subparagraph (A) with local educational agencies\
    \ that include\u2014\n(i)suburban, rural, and urban local educational agencies;\
    \ (ii)local educational agencies serving a high percentage of schools identified\
