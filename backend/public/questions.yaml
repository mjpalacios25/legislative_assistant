- name: question_94
  inputs: What are the mandatory components that must be included in the annual state
    and local educational agency report cards under the legislation?
  metadata:
    chunk_id: '47'
  expected_output:
  - "(h)Reports\n(1)Annual state report card\n(A)In generalA State that receives assistance\
    \ under this part shall prepare and disseminate widely to the public an annual\
    \ State report card for the State as a whole that meets the requirements of this\
    \ paragraph.\n(B)ImplementationThe State report card required under this paragraph\
    \ shall be\u2014 (i)concise;\n(ii)presented in an understandable and uniform format\
    \ that is developed in consultation with parents and, to the extent practicable,\
    \ in a language that parents can understand; and\n(iii)widely accessible to the\
    \ public, which shall include making available on a single webpage of the State\
    \ educational agency\u2019s website, the State report card, all local educational\
    \ agency report cards for each local educational agency in the State required\
    \ under paragraph (2), and the annual report to the Secretary under paragraph\
    \ (5).\n(C)Minimum requirementsEach State report card required under this subsection\
    \ shall include the following information: (i)A clear and concise description\
    \ of the State\u2019s accountability system under subsection (c), including\u2014\
    \n(I)the minimum number of students that the State determines are necessary to\
    \ be included in each of the subgroups of students, as defined in subsection (c)(2),\
    \ for use in the accountability system;\n(II)the long-term goals and measurements\
    \ of interim progress for all students and for each of the subgroups of students,\
    \ as defined in subsection (c)(2);\n(III)the indicators described in subsection\
    \ (c)(4)(B) used to meaningfully differentiate all public schools in the State;\n\
    (IV)the State\u2019s system for meaningfully differentiating all public schools\
    \ in the State, including\u2014 (aa)the specific weight of the indicators described\
    \ in subsection (c)(4)(B) in such differentiation;\n(bb)the methodology by which\
    \ the State differentiates all such schools; (cc)the methodology by which the\
    \ State differentiates a school as consistently underperforming for any subgroup\
    \ of students described in section (c)(4)(C)(iii), including the time period used\
    \ by the State to determine consistent underperformance; and\n(dd)the methodology\
    \ by which the State identifies a school for comprehensive support and improvement\
    \ as required under subsection (c)(4)(D)(i);\n(V)the number and names of all public\
    \ schools in the State identified by the State for comprehensive support and improvement\
    \ under subsection (c)(4)(D)(i) or implementing targeted support and improvement\
    \ plans under subsection (d)(2); and\n(VI)the exit criteria established by the\
    \ State as required under clause (i) of subsection (d)(3)(A), including the length\
    \ of years established under clause (i)(II) of such subsection.\n(ii)For all students\
    \ and disaggregated by each subgroup of students described in subsection (b)(2)(B)(xi),\
    \ homeless status, status as a child in foster care, and status as a student with\
    \ a parent who is a member of the Armed Forces (as defined in section 101(a)(4)\
    \ of title 10, United States Code) on active duty (as defined in section 101(d)(5)\
    \ of such title), information on student achievement on the academic assessments\
    \ described in subsection (b)(2) at each level of achievement, as determined by\
    \ the State under subsection (b)(1).\n(iii)For all students and disaggregated\
    \ by each of the subgroups of students, as defined in subsection (c)(2), and for\
    \ purposes of subclause (II) of this clause, homeless status and status as a child\
    \ in foster care\u2014\n(I)information on the performance on the other academic\
    \ indicator under subsection (c)(4)(B)(ii) for public elementary schools and secondary\
    \ schools that are not high schools, used by the State in the State accountability\
    \ system; and\n(II)high school graduation rates, including four-year adjusted\
    \ cohort graduation rates and, at the State\u2019s discretion, extended-year adjusted\
    \ cohort graduation rates.\n(iv)Information on the number and percentage of English\
    \ learners achieving English language proficiency.\n(v)For all students and disaggregated\
    \ by each of the subgroups of students, as defined in subsection (c)(2), information\
    \ on the performance on the other indicator or indicators of school quality or\
    \ student success under subsection (c)(4)(B)(v) used by the State in the State\
    \ accountability system.\n(vi)Information on the progress of all students and\
    \ each subgroup of students, as defined in subsection (c)(2), toward meeting the\
    \ State-designed long term goals under subsection (c)(4)(A), including the progress\
    \ of all students and each such subgroup of students against the State measurements\
    \ of interim progress established under such subsection.\n(vii)For all students\
    \ and disaggregated by each subgroup of students described in subsection (b)(2)(B)(xi),\
    \ the percentage of students assessed and not assessed.\n(viii)Information submitted\
    \ by the State educational agency and each local educational agency in the State,\
    \ in accordance with data collection conducted pursuant to section 203(c)(1) of\
    \ the Department of Education Organization Act (20 U.S.C. 3413(c)(1)), on\u2014\
    \n(I)measures of school quality, climate, and safety, including rates of in-school\
    \ suspensions, out-of-school suspensions, expulsions, school-related arrests,\
    \ referrals to law enforcement, chronic absenteeism (including both excused and\
    \ unexcused absences), incidences of violence, including bullying and harassment;\
    \ and\n(II)the number and percentage of students enrolled in\u2014 (aa)preschool\
    \ programs; and\n(bb)accelerated coursework to earn postsecondary credit while\
    \ still in high school, such as Advanced Placement and International Baccalaureate\
    \ courses and examinations, and dual or concurrent enrollment programs.\n(ix)The\
    \ professional qualifications of teachers in the State, including information\
    \ (that shall be presented in the aggregate and disaggregated by high-poverty\
    \ compared to low-poverty schools) on the number and percentage of\u2014\n(I)inexperienced\
    \ teachers, principals, and other school leaders; (II)teachers teaching with emergency\
    \ or provisional credentials; and\n(III)teachers who are not teaching in the subject\
    \ or field for which the teacher is certified or licensed.\n(x)The per-pupil expenditures\
    \ of Federal, State, and local funds, including actual personnel expenditures\
    \ and actual nonpersonnel expenditures of Federal, State, and local funds, disaggregated\
    \ by source of funds, for each local educational agency and each school in the\
    \ State for the preceding fiscal year.\n(xi)The number and percentages of students\
    \ with the most significant cognitive disabilities who take an alternate assessment\
    \ under subsection (b)(2)(D), by grade and subject.\n(xii)Results on the State\
    \ academic assessments in reading and mathematics in grades 4 and 8 of the National\
    \ Assessment of Educational Progress carried out under section 303(b)(3) of the\
    \ National Assessment of Educational Progress Authorization Act (20 U.S.C. 9622(b)(3)),\
    \ compared to the national average of such results.\n(xiii)Where available, for\
    \ each high school in the State, and beginning with the report card prepared under\
    \ this paragraph for 2017, the cohort rate (in the aggregate, and disaggregated\
    \ for each subgroup of students defined in subsection (c)(2)), at which students\
    \ who graduate from the high school enroll, for the first academic year that begins\
    \ after the students\u2019 graduation\u2014\n(I)in programs of public postsecondary\
    \ education in the State; and (II)if data are available and to the extent practicable,\
    \ in programs of private postsecondary education in the State or programs of postsecondary\
    \ education outside the State.\n(xiv)Any additional information that the State\
    \ believes will best provide parents, students, and other members of the public\
    \ with information regarding the progress of each of the State\u2019s public elementary\
    \ schools and secondary schools, which may include the number and percentage of\
    \ students attaining career and technical proficiencies (as defined by section\
    \ 113(b) of the Carl D. Perkins Career and Technical Education Act of 2006 (20\
    \ U.S.C. 2323(b)) and reported by States only in a manner consistent with section\
    \ 113(c) of such Act (20 U.S.C. 2323(c)).\n(D)Rules of constructionNothing in\
    \ subparagraph (C)(viii) shall be construed as requiring\u2014 (i)reporting of\
    \ any data that are not collected in accordance with section 203(c)(1) of the\
    \ Department of Education Organization Act (20 U.S.C. 3413(c)(1); or\n(ii)disaggregation\
    \ of any data other than as required under subsection (b)(2)(B)(xi). (2)Annual\
    \ local educational agency report cards (A)Preparation and disseminationA local\
    \ educational agency that receives assistance under this part shall prepare and\
    \ disseminate an annual local educational agency report card that includes information\
    \ on such agency as a whole and each school served by the agency.\n(B)ImplementationEach\
    \ local educational agency report card shall be\u2014 (i)concise;\n(ii)presented\
    \ in an understandable and uniform format, and to the extent practicable, in a\
    \ language that parents can understand; and\n(iii)accessible to the public, which\
    \ shall include\u2014 (I)placing such report card on the website of the local\
    \ educational agency; and\n(II)in any case in which a local educational agency\
    \ does not operate a website, providing the information to the public in another\
    \ manner determined by the local educational agency.\n(C)Minimum requirementsThe\
    \ State educational agency shall ensure that each local educational agency collects\
    \ appropriate data and includes in the local educational agency\u2019s annual\
    \ report the information described in paragraph (1)(C), disaggregated in the same\
    \ manner as required under such paragraph, except for clause (xii) of such paragraph,\
    \ as applied to the local educational agency and each school served by the local\
    \ educational agency, including\u2014\n(i)in the case of a local educational agency,\
    \ information that shows how students served by the local educational agency achieved\
    \ on the academic assessments described in subsection (b)(2) compared to students\
    \ in the State as a whole;\n(ii)in the case of a school, information that shows\
    \ how the school\u2019s students\u2019 achievement on the academic assessments\
    \ described in subsection (b)(2) compared to students served by the local educational\
    \ agency and the State as a whole; and\n(iii)any other information that the local\
    \ educational agency determines is appropriate and will best provide parents,\
    \ students, and other members of the public with information regarding the progress\
    \ of each public school served by the local educational agency, whether or not\
    \ such information is included in the annual State report card.\n(D)Additional\
    \ informationIn the case of a local educational agency that issues a report card\
    \ for all students, the local educational agency may include the information under\
    \ this section as part of such report.\n(3)Preexisting report cardsA State educational\
    \ agency or local educational agency may use public report cards on the performance\
    \ of students, schools, local educational agencies, or the State, that were in\
    \ effect prior to the date of enactment of the Every Student Succeeds Act for\
    \ the purpose of this subsection, so long as any such report card is modified,\
    \ as may be needed, to contain the information required by this subsection, and\
    \ protects the privacy of individual students.\n(4)Cost reductionEach State educational\
    \ agency and local educational agency receiving assistance under this part shall,\
    \ wherever possible, take steps to reduce data collection costs and duplication\
    \ of effort by obtaining the information required under this subsection through\
    \ existing data collection efforts.\n(5)Annual state report to the secretaryEach\
    \ State educational agency receiving assistance under this part shall report annually\
    \ to the Secretary, and make widely available within the State\u2014\n(A)information\
    \ on the achievement of students on the academic assessments required by subsection\
    \ (b)(2), including the disaggregated results for the subgroups of students as\
    \ defined in subsection (c)(2);\n(B)information on the acquisition of English\
    \ proficiency by English learners; (C)the number and names of each public school\
    \ in the State\u2014\n(i)identified for comprehensive support and improvement\
    \ under subsection (c)(4)(D)(i); and (ii)implementing targeted support and improvement\
    \ plans under subsection (d)(2); and\n(D)information on the professional qualifications\
    \ of teachers in the State, including information on the number and the percentage\
    \ of the following teachers:\n(i)Inexperienced teachers. (ii)Teachers teaching\
    \ with emergency or provisional credentials.\n(iii)Teachers who are not teaching\
    \ in the subject or field for which the teacher is certified or licensed.\n(6)Report\
    \ to CongressThe Secretary shall transmit annually to the Committee on Education\
    \ and the Workforce of the House of Representatives and the Committee on Health,\
    \ Education, Labor, and Pensions of the Senate a report that provides national\
    \ and State-level data on the information collected under paragraph (5). Such\
    \ report shall be submitted through electronic means only.\n"
