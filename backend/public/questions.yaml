- name: question_96
  inputs: Under what conditions is disaggregation not required when collecting data
    on students and educators?
  metadata:
    chunk_id: '48'
  expected_output:
  - (i)Privacy (1)In GeneralInformation collected or disseminated under this section
    (including any information collected for or included in the reports described
    in subsection (h)) shall be collected and disseminated in a manner that protects
    the privacy of individuals consistent with section 444 of the General Education
    Provisions Act (20 U.S.C. 1232g, commonly known as the Family Educational Rights
    and Privacy Act of 1974) and this Act. (2)SufficiencyThe reports described in
    subsection (h) shall only include data that are sufficient to yield statistically
    reliable information. (3)DisaggregationDisaggregation under this section shall
    not be required if such disaggregation will reveal personally identifiable information
    about any student, teacher, principal, or other school leader, or will provide
    data that are insufficient to yield statistically reliable information.
