- name: question_32
  inputs: In 2024, what must a school district include in their application to demonstrate
    how they will monitor schools receiving funds under this section and ensure that
    each school receives all allocated funds?
  metadata:
    chunk_id: '16'
  expected_output:
  - "(e)ApplicationTo receive an allotment under subsection (b)(1), a local educational\
    \ agency shall submit an application to the State educational agency at such time,\
    \ in such form, and including such information as the State educational agency\
    \ may require. Each application shall include, at a minimum\u2014\n(1)a description\
    \ of how the local educational agency will carry out its responsibilities under\
    \ section 1111(d) for schools receiving funds under this section, including how\
    \ the local educational agency will\u2014\n(A)develop comprehensive support and\
    \ improvement plans under section 1111(d)(1) for schools receiving funds under\
    \ this section;\n(B)support schools developing or implementing targeted support\
    \ and improvement plans under section 1111(d)(2), if funds received under this\
    \ section are used for such purpose;\n(C)monitor schools receiving funds under\
    \ this section, including how the local educational agency will carry out its\
    \ responsibilities under clauses (iv) and (v) of section 1111(d)(2)(B) if funds\
    \ received under this section are used to support schools implementing targeted\
    \ support and improvement plans;\n(D)use a rigorous review process to recruit,\
    \ screen, select, and evaluate any external partners with whom the local educational\
    \ agency will partner;\n(E)align other Federal, State, and local resources to\
    \ carry out the activities supported with funds received under subsection (b)(1);\
    \ and\n(F)as appropriate, modify practices and policies to provide operational\
    \ flexibility that enables full and effective implementation of the plans described\
    \ in paragraphs (1) and (2) of section 1111(d); and\n(2)an assurance that each\
    \ school the local educational agency proposes to serve will receive all of the\
    \ State and local funds it would have received in the absence of funds received\
    \ under this section.\n"
  evaluators: []
