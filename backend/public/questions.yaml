- name: question_26
  inputs: In 2024, how does the State educational agency allocate the reserved funds
    for the Maplewood School District, and what are the options for the remaining
    5% of the amount?
  metadata:
    chunk_id: '13'
  expected_output:
  - "(b)UsesOf the amount reserved under subsection (a) for any fiscal year, the State\
    \ educational agency\u2014 (1)(A)shall allocate not less than 95 percent of that\
    \ amount to make grants to local educational agencies on a formula or competitive\
    \ basis, to serve schools implementing comprehensive support and improvement activities\
    \ or targeted support and improvement activities under section 1111(d); or\n(B)may,\
    \ with the approval of the local educational agency, directly provide for these\
    \ activities or arrange for their provision through other entities such as school\
    \ support teams, educational service agencies, or nonprofit or for-profit external\
    \ providers with expertise in using evidence-based strategies to improve student\
    \ achievement, instruction, and schools; and\n(2)shall use the funds not allocated\
    \ to local educational agencies under paragraph (1) to carry out this section,\
    \ which shall include\u2014\n(A)establishing the method, consistent with paragraph\
    \ (1)(A), the State will use to allocate funds to local educational agencies under\
    \ such paragraph, including ensuring\u2014\n(i)the local educational agencies\
    \ receiving an allotment under such paragraph represent the geographic diversity\
    \ of the State; and\n(ii)that allotments are of sufficient size to enable a local\
    \ educational agency to effectively implement selected strategies;\n(B)monitoring\
    \ and evaluating the use of funds by local educational agencies receiving an allotment\
    \ under such paragraph; and\n(C)as appropriate, reducing barriers and providing\
    \ operational flexibility for schools in the implementation of comprehensive support\
    \ and improvement activities or targeted support and improvement activities under\
    \ section 1111(d).\n"
  evaluators: []
