    organizations; or (E)in the case of high-quality academic tutoring, a variety
    of providers of such tutoring that are selected and approved by the State and
    appear on the States list of such providers required under subsection (e)(2);
    (6)monitor the provision of direct student services; and (7)publicly report the
    results of direct student service providers in improving relevant student outcomes
    in a manner that is accessible to parents.
