- name: question_92
  inputs: What measures must a state implement to ensure equitable education for all
    students, including those in foster care and homeless populations?
  metadata:
    chunk_id: '46'
  expected_output:
  - "(g)Other plan provisions\n(1)DescriptionsEach State plan shall describe\u2014\
    \ (A)how the State will provide assistance to local educational agencies and individual\
    \ elementary schools choosing to use funds under this part to support early childhood\
    \ education programs;\n(B)how low-income and minority children enrolled in schools\
    \ assisted under this part are not served at disproportionate rates by ineffective,\
    \ out-of-field, or inexperienced teachers, and the measures the State educational\
    \ agency will use to evaluate and publicly report the progress of the State educational\
    \ agency with respect to such description (except that nothing in this subparagraph\
    \ shall be construed as requiring a State to develop or implement a teacher, principal,\
    \ or other school leader evaluation system);\n(C)how the State educational agency\
    \ will support local educational agencies receiving assistance under this part\
    \ to improve school conditions for student learning, including through reducing\u2014\
    \n(i)incidences of bullying and harassment; (ii)the overuse of discipline practices\
    \ that remove students from the classroom; and\n(iii)the use of aversive behavioral\
    \ interventions that compromise student health and safety; (D)how the State will\
    \ support local educational agencies receiving assistance under this part in meeting\
    \ the needs of students at all levels of schooling (particularly students in the\
    \ middle grades and high school), including how the State will work with such\
    \ local educational agencies to provide effective transitions of students to middle\
    \ grades and high school to decrease the risk of students dropping out;\n(E)the\
    \ steps a State educational agency will take to ensure collaboration with the\
    \ State agency responsible for administering the State plans under parts B and\
    \ E of title IV of the Social Security Act (42 U.S.C. 621 et seq. and 670 et seq.)\
    \ to ensure the educational stability of children in foster care, including assurances\
    \ that\u2014\n(i)any such child enrolls or remains in such child\u2019s school\
    \ of origin, unless a determination is made that it is not in such child\u2019\
    s best interest to attend the school of origin, which decision shall be based\
    \ on all factors relating to the child\u2019s best interest, including consideration\
    \ of the appropriateness of the current educational setting and the proximity\
    \ to the school in which the child is enrolled at the time of placement;\n(ii)when\
    \ a determination is made that it is not in such child\u2019s best interest to\
    \ remain in the school of origin, the child is immediately enrolled in a new school,\
    \ even if the child is unable to produce records normally required for enrollment;\n\
    (iii)the enrolling school shall immediately contact the school last attended by\
    \ any such child to obtain relevant academic and other records; and\n(iv)the State\
    \ educational agency will designate an employee to serve as a point of contact\
    \ for child welfare agencies and to oversee implementation of the State agency\
    \ responsibilities required under this subparagraph, and such point of contact\
    \ shall not be the State\u2019s Coordinator for Education of Homeless Children\
    \ and Youths under section 722(d)(3) of the McKinney-Vento Homeless Assistance\
    \ Act (42 U.S.C. 11432(d)(3));\n(F)how the State educational agency will provide\
    \ support to local educational agencies in the identification, enrollment, attendance,\
    \ and school stability of homeless children and youths; and\n(G)such other factors\
    \ the State educational agency determines appropriate to provide students an opportunity\
    \ to achieve the knowledge and skills described in the challenging State academic\
    \ standards.\n(2)AssurancesEach State plan shall contain assurances that\u2014\
    \ (A)the State will make public any methods or criteria the State is using to\
    \ measure teacher, principal, or other school leader effectiveness for the purpose\
    \ of meeting the requirements described in paragraph (1)(B);\n(B)the State educational\
    \ agency will notify local educational agencies, Indian tribes and tribal organizations,\
    \ schools, teachers, parents, and the public of the challenging State academic\
    \ standards, academic assessments, and State accountability system, developed\
    \ under this section;\n(C)the State educational agency will assist each local\
    \ educational agency and school affected by the State plan to meet the requirements\
    \ of this part;\n(D)the State will participate in the biennial State academic\
    \ assessments in reading and mathematics in grades 4 and 8 of the National Assessment\
    \ of Educational Progress carried out under section 303(b)(3) of the National\
    \ Assessment of Educational Progress Authorization Act (20 U.S.C. 9622(b)(3))\
    \ if the Secretary pays the costs of administering such assessments;\n(E)the State\
    \ educational agency will modify or eliminate State fiscal and accounting barriers\
    \ so that schools can easily consolidate funds from other Federal, State, and\
    \ local sources to improve educational opportunities and reduce unnecessary fiscal\
    \ and accounting requirements;\n(F)the State educational agency will support the\
    \ collection and dissemination to local educational agencies and schools of effective\
    \ parent and family engagement strategies, including those included in the parent\
    \ and family engagement policy under section 1116;\n(G)the State educational agency\
    \ will provide the least restrictive and burdensome regulations for local educational\
    \ agencies and individual schools participating in a program assisted under this\
    \ part;\n(H)the State educational agency will ensure that local educational agencies,\
    \ in developing and implementing programs under this part, will, to the extent\
    \ feasible, work in consultation with outside intermediary organizations (such\
    \ as educational service agencies), or individuals, that have practical expertise\
    \ in the development or use of evidence-based strategies and programs to improve\
    \ teaching, learning, and schools;\n(I)the State educational agency has appropriate\
    \ procedures and safeguards in place to ensure the validity of the assessment\
    \ process;\n(J)the State educational agency will ensure that all teachers and\
    \ paraprofessionals working in a program supported with funds under this part\
    \ meet applicable State certification and licensure requirements, including any\
    \ requirements for certification obtained through alternative routes to certification;\n\
    (K)the State educational agency will coordinate activities funded under this part\
    \ with other Federal activities as appropriate;\n(L)the State educational agency\
    \ has involved the committee of practitioners established under section 1603(b)\
    \ in developing the plan and monitoring its implementation;\n(M)the State has\
    \ professional standards for paraprofessionals working in a program supported\
    \ with funds under this part, including qualifications that were in place on the\
    \ day before the date of enactment of the Every Student Succeeds Act; and\n(N)the\
    \ State educational agency will provide the information described in clauses (ii),\
    \ (iii), and (vii) of subsection (h)(1)(C) to the public in an easily accessible\
    \ and user-friendly manner that can be cross-tabulated by, at a minimum, each\
    \ major racial and ethnic group, gender, English proficiency status, and children\
    \ with or without disabilities, which\u2014\n(i)may be accomplished by including\
    \ such information on the annual State report card described subsection (h)(1)(C);\
    \ and\n(ii)shall be presented in a manner that\u2014 (I)is first anonymized and\
    \ does not reveal personally identifiable information about an individual student;\n\
    (II)does not include a number of students in any subgroup of students that is\
    \ insufficient to yield statistically reliable information or that would reveal\
    \ personally identifiable information about an individual student; and\n(III)is\
    \ consistent with the requirements of section 444 of the General Education Provisions\
    \ Act (20 U.S.C. 1232g, commonly known as the Family Educational Rights and Privacy\
    \ Act of 1974).\n(3)Rules of constructionNothing in paragraph (2)(N) shall be\
    \ construed to\u2014 (A)require groups of students obtained by any entity that\
    \ cross-tabulates the information provided under such paragraph to be considered\
    \ subgroups of students, as defined in subsection (c)(2), for the purposes of\
    \ the State accountability system under subsection (c); or\n(B)require or prohibit\
    \ States or local educational agencies from publicly reporting data in a cross-tabulated\
    \ manner, in order to meet the requirements of paragraph (2)(N).\n(4)Technical\
    \ assistanceUpon request by a State educational agency, the Secretary shall provide\
    \ technical assistance to such agency to\u2014\n(A)meet the requirements of paragraph\
    \ (2)(N); or (B)in the case of a State educational agency choosing, at its sole\
    \ discretion, to disaggregate data described in clauses (ii) and (iii)(II) of\
    \ subsection (h)(1)(C) for Asian and Native Hawaiian or Pacific Islander students\
    \ using the same race response categories as the decennial census of the population,\
    \ assist such State educational agency in such disaggregation and in using such\
    \ data to improve academic outcomes for such students.\n"
