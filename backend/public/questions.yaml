    such paragraph represent the geographic diversity of the State; and (ii)that allotments
    are of sufficient size to enable a local educational agency to effectively implement
    selected strategies; (B)monitoring and evaluating the use of funds by local educational
    agencies receiving an allotment under such paragraph; and (C)as appropriate, reducing
    barriers and providing operational flexibility for schools in the implementation
    of comprehensive support and improvement activities or targeted support and improvement
    activities under section 1111(d).
  evaluators: []
