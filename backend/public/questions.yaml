- name: question_68
  inputs: In 2023, what must a State educational agency do to ensure that tutoring
    providers comply with all applicable laws and offer a range of tutoring models,
    including online and on-campus options?
  metadata:
    chunk_id: '34'
  expected_output:
  - "(e)Providers and schoolsA State educational agency that reserves an amount under\
    \ subsection (a) shall\u2014 (1)ensure that each local educational agency that\
    \ receives an award under this section and intends to provide public school choice\
    \ under subsection (c)(3)(E) can provide a sufficient number of options to provide\
    \ a meaningful choice for parents;\n(2)compile and maintain an updated list of\
    \ State-approved high-quality academic tutoring providers that\u2014\n(A)is developed\
    \ using a fair negotiation and rigorous selection and approval process; (B)provides\
