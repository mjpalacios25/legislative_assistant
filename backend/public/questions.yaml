- name: question_86
  inputs: What are the requirements for a school identified for comprehensive support
    and improvement, and what options are available for students in such schools?
  metadata:
    chunk_id: '43'
  expected_output:
  - "(d)School support and improvement activities\n(1)Comprehensive support and improvement\n\
    (A)In generalEach State educational agency receiving funds under this part shall\
    \ notify each local educational agency in the State of any school served by the\
    \ local educational agency that is identified for comprehensive support and improvement\
    \ under subsection (c)(4)(D)(i).\n(B)Local educational agency actionUpon receiving\
    \ such information from the State, the local educational agency shall, for each\
    \ school identified by the State and in partnership with stakeholders (including\
    \ principals and other school leaders, teachers, and parents), locally develop\
    \ and implement a comprehensive support and improvement plan for the school to\
    \ improve student outcomes, that\u2014\n(i)is informed by all indicators described\
    \ in subsection (c)(4)(B), including student performance against State-determined\
    \ long-term goals;\n(ii)includes evidence-based interventions; (iii)is based on\
    \ a school-level needs assessment;\n(iv)identifies resource inequities, which\
    \ may include a review of local educational agency and school-level budgeting,\
    \ to be addressed through implementation of such comprehensive support and improvement\
    \ plan;\n(v)is approved by the school, local educational agency, and State educational\
    \ agency; and (vi)upon approval and implementation, is monitored and periodically\
    \ reviewed by the State educational agency.\n(C)State educational agency discretionWith\
    \ respect to any high school in the State identified under subsection (c)(4)(D)(i)(II),\
    \ the State educational agency may\u2014\n(i)permit differentiated improvement\
    \ activities that utilize evidence-based interventions in the case of such a school\
    \ that predominantly serves students\u2014\n(I)returning to education after having\
    \ exited secondary school without a regular high school diploma; or\n(II)who,\
    \ based on their grade or age, are significantly off track to accumulate sufficient\
    \ academic credits to meet high school graduation requirements, as established\
    \ by the State; and\n(ii)in the case of such a school that has a total enrollment\
    \ of less than 100 students, permit the local educational agency to forego implementation\
    \ of improvement activities required under this paragraph.\n(D)Public school choice\n\
    (i)In generalA local educational agency may provide all students enrolled in a\
    \ school identified by the State for comprehensive support and improvement under\
    \ subsection (c)(4)(D)(i) with the option to transfer to another public school\
    \ served by the local educational agency, unless such an option is prohibited\
    \ by State law.\n(ii)PriorityIn providing students the option to transfer to another\
    \ public school, the local educational agency shall give priority to the lowest-achieving\
    \ children from low-income families, as determined by the local educational agency\
    \ for the purposes of allocating funds to schools under section 1113(a)(3).\n\
    (iii)TreatmentA student who uses the option to transfer to another public school\
    \ shall be enrolled in classes and other activities in the public school to which\
    \ the student transfers in the same manner as all other students at the public\
    \ school.\n(iv)Special ruleA local educational agency shall permit a student who\
    \ transfers to another public school under this paragraph to remain in that school\
    \ until the student has completed the highest grade in that school.\n(v)Funding\
    \ for transportationA local educational agency may spend an amount equal to not\
    \ more than 5 percent of its allocation under subpart 2 of this part to pay for\
    \ the provision of transportation for students who transfer under this paragraph\
    \ to the public schools to which the students transfer.\n(2)Targeted support and\
    \ improvement\n(A)In generalEach State educational agency receiving funds under\
