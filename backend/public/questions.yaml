    in its application to qualify for an award? How does the legislation ensure parental
    empowerment and accountability in student service provision?
  metadata:
    chunk_id: '33'
  expected_output:
  - "(d)ApplicationA local educational agency desiring to receive an award under subsection\
    \ (b) shall submit an application to the State educational agency at such time\
    \ and in such manner as the State educational agency shall require. At a minimum,\
    \ each application shall describe how the local educational agency will\u2014\n\
    (1)provide adequate outreach to ensure parents can exercise a meaningful choice\
    \ of direct student services for their child\u2019s education;\n(2)ensure parents\
    \ have adequate time and information to make a meaningful choice prior to enrolling\
    \ their child in a direct student service;\n(3)in the case of a local educational\
    \ agency offering public school choice under this section, ensure sufficient availability\
    \ of seats in the public schools the local educational agency will make available\
    \ for public school choice options;\n(4)prioritize services to students who are\
    \ lowest-achieving; (5)select providers of direct student services, which may\
    \ include one or more of\u2014\n(A)the local educational agency or other local\
    \ educational agencies; (B)community colleges or other institutions of higher\
    \ education;\n(C)non-public entities; (D)community-based organizations; or\n(E)in\
    \ the case of high-quality academic tutoring, a variety of providers of such tutoring\
    \ that are selected and approved by the State and appear on the State\u2019s list\
    \ of such providers required under subsection (e)(2);\n(6)monitor the provision\
    \ of direct student services; and (7)publicly report the results of direct student\
    \ service providers in improving relevant student outcomes in a manner that is\
    \ accessible to parents.\n"
  evaluators: []
