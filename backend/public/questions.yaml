    \ standards through State and local innovation; and\n(iii)provide transparent,\
    \ timely, and objective feedback to States designed to strengthen the technical\
    \ and overall quality of the State plans.\n(C)Standard and nature of reviewPeer\
    \ reviewers shall conduct an objective review of State plans in their totality\
    \ and out of respect for State and local judgments, with the goal of supporting\
    \ State- and local-led innovation and providing objective feedback on the technical\
    \ and overall quality of a State plan.\n(D)ProhibitionNeither the Secretary nor\
    \ the political appointees of the Department, may attempt to participate in, or\
    \ influence, the peer-review process.\n(5)Public reviewAll written communications,\
    \ feedback, and notifications under this subsection shall be conducted in a manner\
    \ that is transparent and immediately made available to the public on the Department\u2019\
    s website, including\u2014\n(A)plans submitted or resubmitted by a State; (B)peer-review\
    \ guidance, notes, and comments and the names of the peer reviewers (once the\
    \ peer reviewers have completed their work);\n(C)State plan determinations by\
    \ the Secretary, including approvals or disapprovals; and (D)notices and transcripts\
    \ of hearings under this section.\n(6)Duration of the plan\n(A)In generalEach\
    \ State plan shall\u2014 (i)remain in effect for the duration of the State\u2019\
    s participation under this part; and\n(ii)be periodically reviewed and revised\
    \ as necessary by the State educational agency to reflect changes in the State\u2019\
    s strategies and programs under this part.\n(B)Additional information\n(i)In generalIf\
    \ a State makes significant changes to its plan at any time, such as the adoption\
    \ of new challenging State academic standards or new academic assessments under\
    \ subsection (b), or changes to its accountability system under subsection (c),\
    \ such information shall be submitted to the Secretary in the form of revisions\
    \ or amendments to the State plan.\n(ii)Review of revised plansThe Secretary shall\
    \ review the information submitted under clause (i) and approve changes to the\
    \ State plan, or disapprove such changes in accordance with paragraph (4)(A)(vi),\
    \ within 90 days, without undertaking the peer-review process under such paragraph.\n\
    (iii)Special rule for standardsIf a State makes changes to its challenging State\
    \ academic standards, the requirements of subsection (b)(1), including the requirement\
    \ that such standards need not be submitted to the Secretary pursuant to subsection\
    \ (b)(1)(A), shall still apply.\n(7)Failure to meet requirementsIf a State fails\
    \ to meet any of the requirements of this section, the Secretary may withhold\
    \ funds for State administration under this part until the Secretary determines\
    \ that the State has fulfilled those requirements.\n(8)Public commentEach State\
    \ shall make the State plan publicly available for public comment for a period\
    \ of not less than 30 days, by electronic means and in an easily accessible format,\
    \ prior to submission to the Secretary for approval under this subsection. The\
    \ State, in the plan it files under this subsection, shall provide an assurance\
    \ that public comments were taken into account in the development of the State\
    \ plan.\n"
