- name: question_74
  inputs: What is the priority order for allocating funds to direct student services,
    and what types of services are covered under this legislation?
  metadata:
    chunk_id: '37'
  expected_output:
  - "(c)Local use of fundsA local educational agency receiving an award under this\
    \ section\u2014\n(1)may use not more than 1 percent of its award for outreach\
    \ and communication to parents about available direct student services described\
    \ in paragraph (3) in the local educational agency and State;\n(2)may use not\
    \ more than 2 percent of its award for administrative costs related to such direct\
    \ student services;\n(3)shall use the remainder of the award to pay the costs\
    \ associated with one or more of the following direct student services\u2014\n\
    (A)enrollment and participation in academic courses not otherwise available at\
    \ a student\u2019s school, including\u2014\n(i)advanced courses; and (ii)career\
    \ and technical education coursework that\u2014\n(I)is aligned with the challenging\
    \ State academic standards; and (II)leads to industry-recognized credentials that\
    \ meet the quality criteria established by the State under section 123(a) of the\
    \ Workforce Innovation and Opportunity Act (29 U.S.C. 3102);\n(B)credit recovery\
    \ and academic acceleration courses that lead to a regular high school diploma;\
    \ (C)activities that assist students in successfully completing postsecondary\
    \ level instruction and examinations that are accepted for credit at institutions\
    \ of higher education (including Advanced Placement and International Baccalaureate\
    \ courses), which may include reimbursing low-income students to cover part or\
    \ all of the costs of fees for such examinations;\n(D)components of a personalized\
    \ learning approach, which may include high-quality academic tutoring; and\n(E)in\
    \ the case of a local educational agency that does not reserve funds under section\
    \ 1111(d)(1)(D)(v), transportation to allow a student enrolled in a school identified\
    \ for comprehensive support and improvement under section 1111(c)(4)(D)(i) to\
    \ transfer to another public school (which may include a charter school) that\
    \ has not been identified by the State under such section; and\n(4)in paying the\
    \ costs associated with the direct student services described in paragraph (3),\
    \ shall\u2014 (A)first, pay such costs for students who are enrolled in schools\
    \ identified by the State for comprehensive support and improvement under section\
    \ 1111(c)(4)(D)(i);\n(B)second, pay such costs for low-achieving students who\
    \ are enrolled in schools implementing targeted support and improvement plans\
    \ under section 1111(d)(2); and\n(C)with any remaining funds, pay such costs for\
    \ other low-achieving students served by the local educational agency.\n"
  evaluators: []
