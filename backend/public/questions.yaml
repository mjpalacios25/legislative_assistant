    \ Department\u2019s website, the list of peer reviewers who have reviewed State\
    \ plans under this section;\n(iv)ensure that the peer-review teams consist of\
    \ varied individuals so that the same peer reviewers are not reviewing all of\
    \ the State plans;\n(v)approve a State plan not later than 120 days after its\
    \ submission, unless the Secretary meets the requirements of clause (vi);\n(vi)have\
    \ the authority to disapprove a State plan only if\u2014 (I)the Secretary\u2014\
    \n(aa)determines how the State plan fails to meet the requirements of this section;\
    \ (bb)immediately provides to the State, in writing, notice of such determination,\
    \ and the supporting information and rationale to substantiate such determination;\n\
    (cc)offers the State an opportunity to revise and resubmit its State plan, and\
    \ provides the State\u2014 (AA)technical assistance to assist the State in meeting\
    \ the requirements of this section;\n(BB)in writing, all peer-review comments,\
    \ suggestions, recommendations, or concerns relating to its State plan; and\n\
    (CC)a hearing, unless the State declines the opportunity for such hearing; and\
    \ (II)the State\u2014\n(aa)does not revise and resubmit its State plan; or (bb)in\
    \ a case in which a State revises and resubmits its State plan after a hearing\
    \ is conducted under subclause (I)(cc)(CC), or after the State has declined the\
    \ opportunity for such a hearing, the Secretary determines that such revised State\
    \ plan does not meet the requirements of this section.\n(B)Purpose of peer reviewThe\
    \ peer-review process shall be designed to\u2014 (i)maximize collaboration with\
