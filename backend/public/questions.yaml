- name: question_88
  inputs: What restrictions apply to the Secretary's authority to create new requirements
    or define terms related to the statewide accountability system?
  metadata:
    chunk_id: '44'
  expected_output:
  - "(e)Prohibition\n(1)In generalNothing in this Act shall be construed to authorize\
    \ or permit the Secretary\u2014 (A)when promulgating any rule or regulation, to\
    \ promulgate any rule or regulation on the development or implementation of the\
    \ statewide accountability system established under this section that would\u2014\
    \n(i)add new requirements that are inconsistent with or outside the scope of this\
    \ part; (ii)add new criteria that are inconsistent with or outside the scope of\
    \ this part; or\n(iii)be in excess of statutory authority granted to the Secretary;\
    \ (B)as a condition of approval of the State plan, or revisions or amendments\
    \ to, the State plan, or approval of a waiver request submitted under section\
    \ 8401, to\u2014\n(i)require a State to add any requirements that are inconsistent\
    \ with or outside the scope of this part;\n(ii)require a State to add or delete\
    \ one or more specific elements of the challenging State academic standards; or\n\
    (iii)prescribe\u2014 (I)numeric long-term goals or measurements of interim progress\
    \ that States establish for all students, for any subgroups of students, and for\
    \ English learners with respect to English language proficiency, under this part,\
    \ including\u2014\n(aa)the length of terms set by States in designing such goals;\
    \ or (bb)the progress expected from any subgroups of students in meeting such\
    \ goals;\n(II)specific academic assessments or assessment items that States or\
    \ local educational agencies use to meet the requirements of subsection (b)(2)\
    \ or otherwise use to measure student academic achievement or student growth under\
    \ this part;\n(III)indicators that States use within the State accountability\
    \ system under this section, including any requirement to measure student growth,\
    \ or, if a State chooses to measure student growth, the specific metrics used\
    \ to measure such growth under this part;\n(IV)the weight of any measure or indicator\
    \ used to identify or meaningfully differentiate schools, under this part;\n(V)the\
    \ specific methodology used by States to meaningfully differentiate or identify\
    \ schools under this part;\n(VI)any specific school support and improvement strategies\
    \ or activities that State or local educational agencies establish and implement\
    \ to intervene in, support, and improve schools and improve student outcomes under\
    \ this part;\n(VII)exit criteria established by States under subsection (d)(3)(A)(i);\
    \ (VIII)provided that the State meets the requirements in subsection (c)(3), a\
    \ minimum number of students established by a State under such subsection;\n(IX)any\
    \ aspect or parameter of a teacher, principal, or other school leader evaluation\
    \ system within a State or local educational agency;\n(X)indicators or specific\
    \ measures of teacher, principal, or other school leader effectiveness or quality;\
    \ or\n(XI)the way in which the State factors the requirement under subsection\
    \ (c)(4)(E)(i) into the statewide accountability system under this section; or\n\
    (C)to issue new non-regulatory guidance that\u2014 (i)in seeking to provide explanation\
    \ of requirements under this section for State or local educational agencies,\
    \ either in response to requests for information or in anticipation of such requests,\
    \ provides a strictly limited or exhaustive list to illustrate successful implementation\
    \ of provisions under this section; or\n(ii)purports to be legally binding; or\
    \ (D)to require data collection under this part beyond data derived from existing\
    \ Federal, State, and local reporting requirements.\n(2)Defining termsIn carrying\
    \ out this part, the Secretary shall not, through regulation or as a condition\
    \ of approval of the State plan or revisions or amendments to the State plan,\
    \ promulgate a definition of any term used in this part, or otherwise prescribe\
    \ any specification for any such term, that is inconsistent with or outside the\
    \ scope of this part or is in violation of paragraph (1).\n"
