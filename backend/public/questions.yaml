    \ online and on campus; and (D)includes only providers that\u2014\n(i)have a demonstrated\
    \ record of success in increasing students\u2019 academic achievement; (ii)comply\
    \ with all applicable Federal, State, and local health, safety, and civil rights\
    \ laws; and\n(iii)provide instruction and content that is secular, neutral, and\
    \ non-ideological; (3)ensure that each local educational agency receiving an award\
    \ is able to provide an adequate number of high-quality academic tutoring options\
    \ to ensure parents have a meaningful choice of services;\n(4)develop and implement\
    \ procedures for monitoring the quality of services provided by direct student\
    \ service providers; and\n(5)establish and implement clear criteria describing\
    \ the course of action for direct student service providers that are not successful\
    \ in improving student academic outcomes, which, for a high-quality academic tutoring\
    \ provider, may include a process to remove State approval under paragraph (2)."
