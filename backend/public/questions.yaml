- name: question_82
  inputs: What is the maximum percentage of students that can be assessed using alternate
    assessments for students with the most significant cognitive disabilities in a
    school district in California under this legislation?
  metadata:
    chunk_id: '41'
  expected_output:
  - "(b)Challenging academic standards and academic assessments\n(1)Challenging State\
    \ academic standards\n(A)In generalEach State, in the plan it files under subsection\
    \ (a), shall provide an assurance that the State has adopted challenging academic\
    \ content standards and aligned academic achievement standards (referred to in\
    \ this Act as challenging State academic standards), which achievement standards\
    \ shall include not less than 3 levels of achievement, that will be used by the\
    \ State, its local educational agencies, and its schools to carry out this part.\
    \ A State shall not be required to submit such challenging State academic standards\
    \ to the Secretary.\n(B)Same standardsExcept as provided in subparagraph (E),\
    \ the standards required by subparagraph (A) shall\u2014 (i)apply to all public\
    \ schools and public school students in the State; and\n(ii)with respect to academic\
    \ achievement standards, include the same knowledge, skills, and levels of achievement\
    \ expected of all public school students in the State.\n(C)SubjectsThe State shall\
    \ have such academic standards for mathematics, reading or language arts, and\
    \ science, and may have such standards for any other subject determined by the\
    \ State.\n(D)Alignment\n(i)In generalEach State shall demonstrate that the challenging\
    \ State academic standards are aligned with entrance requirements for credit-bearing\
    \ coursework in the system of public higher education in the State and relevant\
    \ State career and technical education standards.\n(ii)Rule of ConstructionNothing\
    \ in this Act shall be construed to authorize public institutions of higher education\
    \ to determine the specific challenging State academic standards required under\
    \ this paragraph.\n(E)Alternate academic achievement standards for students with\
    \ the most significant cognitive\n\t\t\t disabilities\n(i)In generalThe State\
    \ may, through a documented and validated standards-setting process, adopt alternate\
    \ academic achievement standards for students with the most significant cognitive\
    \ disabilities, provided those standards\u2014\n(I)are aligned with the challenging\
    \ State academic content standards under subparagraph (A); (II)promote access\
    \ to the general education curriculum, consistent with the Individuals with Disabilities\
    \ Education Act (20 U.S.C. 1400 et seq.);\n(III)reflect professional judgment\
    \ as to the highest possible standards achievable by such students; (IV)are designated\
    \ in the individualized education program developed under section 614(d)(3) of\
    \ the Individuals with Disabilities Education Act (20 U.S.C. 1414(d)(3)) for each\
    \ such student as the academic achievement standards that will be used for the\
    \ student; and\n(V)are aligned to ensure that a student who meets the alternate\
    \ academic achievement standards is on track to pursue postsecondary education\
    \ or employment, consistent with the purposes of Public Law 93\u2013112, as in\
    \ effect on July 22, 2014.\n(ii)Prohibition on any other alternate or modified\
    \ academic achievement standardsA State shall not develop, or implement for use\
    \ under this part, any alternate academic achievement standards for children with\
    \ disabilities that are not alternate academic achievement standards that meet\
    \ the requirements of clause (i).\n(F)English language proficiency standardsEach\
    \ State plan shall demonstrate that the State has adopted English language proficiency\
    \ standards that\u2014\n(i)are derived from the 4 recognized domains of speaking,\
    \ listening, reading, and writing; (ii)address the different proficiency levels\
    \ of English learners; and\n(iii)are aligned with the challenging State academic\
    \ standards. (G)Prohibitions (i)Standards review or approvalA State shall not\
    \ be required to submit any standards developed under this subsection to the Secretary\
    \ for review or approval.\n(ii)Federal controlThe Secretary shall not have the\
    \ authority to mandate, direct, control, coerce, or exercise any direction or\
    \ supervision over any of the challenging State academic standards adopted or\
    \ implemented by a State.\n(H)Existing standardsNothing in this part shall prohibit\
    \ a State from revising, consistent with this section, any standards adopted under\
    \ this part before or after the date of enactment of the Every Student Succeeds\
    \ Act.\n(2)Academic assessments\n(A)In generalEach State plan shall demonstrate\
    \ that the State educational agency, in consultation with local educational agencies,\
    \ has implemented a set of high-quality student academic assessments in mathematics,\
    \ reading or language arts, and science. The State retains the right to implement\
    \ such assessments in any other subject chosen by the State.\n(B)RequirementsThe\
    \ assessments under subparagraph (A) shall\u2014 (i)except as provided in subparagraph\
    \ (D), be\u2014\n(I)the same academic assessments used to measure the achievement\
    \ of all public elementary school and secondary school students in the State;\
    \ and\n(II)administered to all public elementary school and secondary school students\
    \ in the State; (ii)be aligned with the challenging State academic standards,\
    \ and provide coherent and timely information about student attainment of such\
    \ standards and whether the student is performing at the student's grade level;\n\
    (iii)be used for purposes for which such assessments are valid and reliable, consistent\
    \ with relevant, nationally recognized professional and technical testing standards,\
    \ objectively measure academic achievement, knowledge, and skills, and be tests\
    \ that do not evaluate or assess personal or family beliefs and attitudes, or\
    \ publicly disclose personally identifiable information;\n(iv)be of adequate technical\
    \ quality for each purpose required under this Act and consistent with the requirements\
    \ of this section, the evidence of which shall be made public, including on the\
    \ website of the State educational agency;\n(v)(I)in the case of mathematics and\
    \ reading or language arts, be administered\u2014 (aa)in each of grades 3 through\
    \ 8; and\n(bb)at least once in grades 9 through 12; (II)in the case of science,\
    \ be administered not less than one time during\u2014\n(aa)grades 3 through 5;\
    \ (bb)grades 6 through 9; and\n(cc)grades 10 through 12; and (III)in the case\
    \ of any other subject chosen by the State, be administered at the discretion\
    \ of the State;\n(vi)involve multiple up-to-date measures of student academic\
    \ achievement, including measures that assess higher-order thinking skills and\
    \ understanding, which may include measures of student academic growth and may\
    \ be partially delivered in the form of portfolios, projects, or extended performance\
    \ tasks;\n(vii)provide for\u2014 (I)the participation in such assessments of all\
    \ students;\n(II)the appropriate accommodations, such as interoperability with,\
    \ and ability to use, assistive technology, for children with disabilities (as\
    \ defined in section 602(3) of the Individuals with Disabilities Education Act\
    \ (20 U.S.C. 1401(3))), including students with the most significant cognitive\
    \ disabilities, and students with a disability who are provided accommodations\
    \ under an Act other than the Individuals with Disabilities Education Act (20\
    \ U.S.C. 1400 et seq.), necessary to measure the academic achievement of such\
    \ children relative to the challenging State academic standards or alternate academic\
    \ achievement standards described in paragraph (1)(E); and\n(III)the inclusion\
    \ of English learners, who shall be assessed in a valid and reliable manner and\
    \ provided appropriate accommodations on assessments administered to such students\
    \ under this paragraph, including, to the extent practicable, assessments in the\
    \ language and form most likely to yield accurate data on what such students know\
    \ and can do in academic content areas, until such students have achieved English\
    \ language proficiency, as determined under subparagraph (G);\n(viii)at the State\u2019\
    s discretion\u2014 (I)be administered through a single summative assessment; or\n\
    (II)be administered through multiple statewide interim assessments during the\
    \ course of the academic year that result in a single summative score that provides\
    \ valid, reliable, and transparent information on student achievement or growth;\n\
    (ix)notwithstanding clause (vii)(III), provide for assessments (using tests in\
    \ English) of reading or language arts of any student who has attended school\
    \ in the United States (not including the Commonwealth of Puerto Rico) for 3 or\
    \ more consecutive school years, except that if the local educational agency determines,\
    \ on a case-by-case individual basis, that academic assessments in another language\
    \ or form would likely yield more accurate and reliable information on what such\
    \ student knows and can do, the local educational agency may make a determination\
    \ to assess such student in the appropriate language other than English for a\
    \ period that does not exceed 2 additional consecutive years, provided that such\
    \ student has not yet reached a level of English language proficiency sufficient\
    \ to yield valid and reliable information on what such student knows and can do\
    \ on tests (written in English) of reading or language arts;\n(x)produce individual\
    \ student interpretive, descriptive, and diagnostic reports, consistent with clause\
    \ (iii), regarding achievement on such assessments that allow parents, teachers,\
    \ principals, and other school leaders to understand and address the specific\
    \ academic needs of students, and that are provided to parents, teachers, and\
    \ school leaders, as soon as is practicable after the assessment is given, in\
    \ an understandable and uniform format, and to the extent practicable, in a language\
    \ that parents can understand;\n(xi)enable results to be disaggregated within\
    \ each State, local educational agency, and school by\u2014 (I)each major racial\
    \ and ethnic group;\n(II)economically disadvantaged students as compared to students\
    \ who are not economically disadvantaged; (III)children with disabilities as compared\
    \ to children without disabilities;\n(IV)English proficiency status; (V)gender;\
    \ and\n(VI)migrant status, except that such disaggregation shall not be required\
    \ in the case of a State, local educational agency, or a school in which the number\
    \ of students in a subgroup is insufficient to yield statistically reliable information\
    \ or the results would reveal personally identifiable information about an individual\
    \ student;(xii)enable itemized score analyses to be produced and reported, consistent\
    \ with clause (iii), to local educational agencies and schools, so that parents,\
    \ teachers, principals, other school leaders, and administrators can interpret\
    \ and address the specific academic needs of students as indicated by the students\u2019\
    \ achievement on assessment items; and\n(xiii)be developed, to the extent practicable,\
    \ using the principles of universal design for learning. (C)Exception for Advanced\
    \ Mathematics in Middle SchoolA State may exempt any 8th grade student from the\
    \ assessment in mathematics described in subparagraph (B)(v)(I)(aa) if\u2014\n\
    (i)such student takes the end-of-course assessment the State typically administers\
    \ to meet the requirements of subparagraph (B)(v)(I)(bb) in mathematics;\n(ii)such\
    \ student\u2019s achievement on such end-of-course assessment is used for purposes\
    \ of subsection (c)(4)(B)(i), in lieu of such student\u2019s achievement on the\
    \ mathematics assessment required under subparagraph (B)(v)(I)(aa), and such student\
    \ is counted as participating in the assessment for purposes of subsection (c)(4)(B)(vi);\
    \ and\n(iii)in high school, such student takes a mathematics assessment pursuant\
    \ to subparagraph (B)(v)(I)(bb) that\u2014\n(I)is any end-of-course assessment\
    \ or other assessment that is more advanced than the assessment taken by such\
    \ student under clause (i) of this subparagraph; and\n(II)shall be used to measure\
    \ such student\u2019s academic achievement for purposes of subsection (c)(4)(B)(i).\n\
    (D)Alternate assessments for students with the most significant cognitive disabilities\n\
    (i)Alternate assessments aligned with alternate academic achievement standardsA\
    \ State may provide for alternate assessments aligned with the challenging State\
    \ academic standards and alternate academic achievement standards described in\
    \ paragraph (1)(E) for students with the most significant cognitive disabilities,\
    \ if the State\u2014\n(I)consistent with clause (ii), ensures that, for each subject,\
    \ the total number of students assessed in such subject using the alternate assessments\
    \ does not exceed 1 percent of the total number of all students in the State who\
    \ are assessed in such subject;\n(II)ensures that the parents of such students\
    \ are clearly informed, as part of the process for developing the individualized\
    \ education program (as defined in section 614(d)(1)(A) of the Individuals with\
    \ Disabilities Education Act (20 U.S.C. 1414(d)(1)(A)))\u2014\n(aa)that their\
    \ child\u2019s academic achievement will be measured based on such alternate standards;\
    \ and (bb)how participation in such assessments may delay or otherwise affect\
    \ the student from completing the requirements for a regular high school diploma;\n\
    (III)promotes, consistent with the Individuals with Disabilities Education Act\
    \ (20 U.S.C. 1400 et seq.), the involvement and progress of students with the\
    \ most significant cognitive disabilities in the general education curriculum;\n\
    (IV)describes in the State plan the steps the State has taken to incorporate universal\
    \ design for learning, to the extent feasible, in alternate assessments;\n(V)describes\
    \ in the State plan that general and special education teachers, and other appropriate\
    \ staff\u2014\n(aa)know how to administer the alternate assessments; and (bb)make\
    \ appropriate use of accommodations for students with disabilities on all assessments\
    \ required under this paragraph;\n(VI)develops, disseminates information on, and\
    \ promotes the use of appropriate accommodations to increase the number of students\
    \ with significant cognitive disabilities\u2014\n(aa)participating in academic\
    \ instruction and assessments for the grade level in which the student is enrolled;\
    \ and\n(bb)who are tested based on challenging State academic standards for the\
    \ grade level in which the student is enrolled; and\n(VII)does not preclude a\
    \ student with the most significant cognitive disabilities who takes an alternate\
    \ assessment based on alternate academic achievement standards from attempting\
    \ to complete the requirements for a regular high school diploma.\n(ii)Special\
    \ rules\n(I)Responsibility under ideaSubject to the authority and requirements\
    \ for the individualized education program team for a child with a disability\
    \ under section 614(d)(1)(A)(i)(VI)(bb) of the Individuals with Disabilities Education\
    \ Act (20 U.S.C. 1414(d)(1)(A)(i)(VI)(bb)), such team, consistent with the guidelines\
    \ established by the State and required under section 612(a)(16)(C) of such Act\
    \ (20 U.S.C. 1412(c)(16)(C)) and clause (i)(II) of this subparagraph, shall determine\
    \ when a child with a significant cognitive disability shall participate in an\
    \ alternate assessment aligned with the alternate academic achievement standards.\n\
    (II)Prohibition on local capNothing in this subparagraph shall be construed to\
    \ permit the Secretary or a State educational agency to impose on any local educational\
    \ agency a cap on the percentage of students administered an alternate assessment\
    \ under this subparagraph, except that a local educational agency exceeding the\
    \ cap applied to the State under clause (i)(I) shall submit information to the\
    \ State educational agency justifying the need to exceed such cap.\n(III)State\
    \ supportA State shall provide appropriate oversight, as determined by the State,\
    \ of any local educational agency that is required to submit information to the\
    \ State under subclause (II).\n(IV)Waiver authorityThis subparagraph shall be\
    \ subject to the waiver authority under section 8401. (E)State authorityIf a State\
    \ educational agency provides evidence, which is satisfactory to the Secretary,\
    \ that neither the State educational agency nor any other State government official,\
    \ agency, or entity has sufficient authority, under State law, to adopt challenging\
    \ State academic standards, and academic assessments aligned with such standards,\
    \ which will be applicable to all students enrolled in the State\u2019s public\
    \ elementary schools and secondary schools, then the State educational agency\
    \ may meet the requirements of this subsection by\u2014\n(i)adopting academic\
    \ standards and academic assessments that meet the requirements of this subsection,\
    \ on a statewide basis, and limiting their applicability to students served under\
    \ this part; or\n(ii)adopting and implementing policies that ensure that each\
    \ local educational agency in the State that receives grants under this part will\
    \ adopt academic content and student academic achievement standards, and academic\
    \ assessments aligned with such standards, which\u2014\n(I)meet all of the criteria\
    \ in this subsection and any regulations regarding such standards and assessments\
    \ that the Secretary may publish; and\n(II)are applicable to all students served\
    \ by each such local educational agency. (F)Language assessments (i)In generalEach\
    \ State plan shall identify the languages other than English that are present\
    \ to a significant extent in the participating student population of the State\
    \ and indicate the languages for which annual student academic assessments are\
    \ not available and are needed.\n(ii)Secretarial assistanceThe State shall make\
    \ every effort to develop such assessments and may request assistance from the\
    \ Secretary if linguistically accessible academic assessment measures are needed.\
    \ Upon request, the Secretary shall assist with the identification of appropriate\
    \ academic assessment measures in the needed languages, but shall not mandate\
    \ a specific academic assessment or mode of instruction.\n(G)Assessments of English\
    \ language proficiency\n(i)In generalEach State plan shall demonstrate that local\
    \ educational agencies in the State will provide for an annual assessment of English\
    \ proficiency of all English learners in the schools served by the State educational\
    \ agency.\n(ii)AlignmentThe assessments described in clause (i) shall be aligned\
    \ with the State\u2019s English language proficiency standards described in paragraph\
    \ (1)(F).\n(H)Locally-selected assessment\n(i)In generalNothing in this paragraph\
    \ shall be construed to prohibit a local educational agency from administering\
    \ a locally-selected assessment in lieu of the State-designed academic assessment\
    \ under subclause (I)(bb) and subclause (II)(cc) of subparagraph (B)(v), if the\
    \ local educational agency selects a nationally-recognized high school academic\
    \ assessment that has been approved for use by the State as described in clause\
    \ (iii) or (iv) of this subparagraph.\n(ii)State technical criteriaTo allow for\
    \ State approval of nationally-recognized high school academic assessments that\
    \ are available for local selection under clause (i), a State educational agency\
    \ shall establish technical criteria to determine if any such assessment meets\
    \ the requirements of clause (v).\n(iii)State approvalIf a State educational agency\
    \ chooses to make a nationally-recognized high school assessment available for\
    \ selection by a local educational agency under clause (i), which has not already\
    \ been approved under this clause, such State educational agency shall\u2014\n\
    (I)conduct a review of the assessment to determine if such assessment meets or\
    \ exceeds the technical criteria established by the State educational agency under\
    \ clause (ii);\n(II)submit evidence in accordance with subsection (a)(4) that\
    \ demonstrates such assessment meets the requirements of clause (v); and\n(III)after\
    \ fulfilling the requirements of subclauses (I) and (II), approve such assessment\
    \ for selection and use by any local educational agency that requests to use such\
    \ assessment under clause (i).\n(iv)Local educational agency option\n(I)Local\
    \ educational agencyIf a local educational agency chooses to submit a nationally-recognized\
    \ high school academic assessment to the State educational agency, subject to\
    \ the approval process described in subclause (I) and subclause (II) of clause\
    \ (iii) to determine if such assessment fulfills the requirements of clause (v),\
    \ the State educational agency may approve the use of such assessment consistent\
    \ with clause (i).\n(II)State educational agencyUpon such approval, the State\
    \ educational agency shall approve the use of such assessment in any other local\
    \ educational agency in the State that subsequently requests to use such assessment\
    \ without repeating the process described in subclauses (I) and (II) of clause\
    \ (iii).\n(v)RequirementsTo receive approval from the State educational agency\
    \ under clause (iii), a locally-selected assessment shall\u2014\n(I)be aligned\
    \ to the State\u2019s academic content standards under paragraph (1), address\
    \ the depth and breadth of such standards, and be equivalent in its content coverage,\
    \ difficulty, and quality to the State-designed assessments under this paragraph\
    \ (and may be more rigorous in its content coverage and difficulty than such State-designed\
    \ assessments);\n(II)provide comparable, valid, and reliable data on academic\
    \ achievement, as compared to the State-designed assessments, for all students\
    \ and for each subgroup of students defined in subsection (c)(2), with results\
    \ expressed in terms consistent with the State\u2019s academic achievement standards\
    \ under paragraph (1), among all local educational agencies within the State;\n\
    (III)meet the requirements for the assessments under subparagraph (B) of this\
    \ paragraph, including technical criteria, except the requirement under clause\
    \ (i) of such subparagraph; and\n(IV)provide unbiased, rational, and consistent\
    \ differentiation between schools within the State to meet the requirements of\
    \ subsection (c).\n(vi)Parental notificationA local educational agency shall notify\
    \ the parents of high school students served by the local educational agency\u2014\
    \n(I)of its request to the State educational agency for approval to administer\
    \ a locally-selected assessment; and\n(II)upon approval, and at the beginning\
    \ of each subsequent school year during which the locally selected assessment\
    \ will be administered, that the local educational agency will be administering\
    \ a different assessment than the State-designed assessments under subclause (I)(bb)\
    \ and subclause (II)(cc) of subparagraph (B)(v).\n(I)DeferralA State may defer\
    \ the commencement, or suspend the administration, but not cease the development,\
    \ of the assessments described in this paragraph, for 1 year for each year for\
    \ which the amount appropriated for grants under part B is less than $369,100,000.\n\
    (J)Adaptive Assessments\n(i)In GeneralSubject to clause (ii), a State retains\
    \ the right to develop and administer computer adaptive assessments as the assessments\
    \ described in this paragraph, provided the computer adaptive assessments meet\
    \ the requirements of this paragraph, except that\u2014\n(I)subparagraph (B)(i)\
    \ shall not be interpreted to require that all students taking the computer adaptive\
    \ assessment be administered the same assessment items; and\n(II)such assessment\u2014\
    \ (aa)shall measure, at a minimum, each student\u2019s academic proficiency based\
    \ on the challenging State academic standards for the student\u2019s grade level\
    \ and growth toward such standards; and\n(bb)may measure the student\u2019s level\
    \ of academic proficiency and growth using items above or below the student\u2019\
    s grade level, including for use as part of a State\u2019s accountability system\
    \ under subsection (c).\n(ii)Students with the most significant cognitive disabilities\
    \ and English learnersIn developing and administering computer adaptive assessments\u2014\
    \ (I)as the assessments allowed under subparagraph (D), a State shall ensure that\
    \ such computer adaptive assessments\u2014\n(aa)meet the requirements of this\
    \ paragraph, including subparagraph (D), except such assessments shall not be\
    \ required to meet the requirements of clause (i)(II); and\n(bb)assess the student's\
    \ academic achievement to measure, in the subject being assessed, whether the\
    \ student is performing at the student's grade level; and\n(II)as the assessments\
    \ required under subparagraph (G), a State shall ensure that such computer adaptive\
    \ assessments\u2014\n(aa)meet the requirements of this paragraph, including subparagraph\
    \ (G), except such assessment shall not be required to meet the requirements of\
    \ clause (i)(II); and\n(bb)assess the student\u2019s language proficiency, which\
    \ may include growth towards such proficiency, in order to measure the student\u2019\
    s acquisition of English.\n(K)Rule of construction on parent rightsNothing in\
    \ this paragraph shall be construed as preempting a State or local law regarding\
    \ the decision of a parent to not have the parent's child participate in the academic\
    \ assessments under this paragraph.\n(L)Limitation on assessment timeSubject to\
    \ Federal or State requirements related to assessments, evaluations, and accommodations,\
    \ each State may, at the sole discretion of such State, set a target limit on\
    \ the aggregate amount of time devoted to the administration of assessments for\
    \ each grade, expressed as a percentage of annual instructional hours.\n(3)Exception\
    \ for recently arrived English Learners\n(A)AssessmentsWith respect to recently\
    \ arrived English learners who have been enrolled in a school in one of the 50\
    \ States in the United States or the District of Columbia for less than 12 months,\
    \ a State may choose to\u2014\n(i)exclude\u2014 (I)such an English learner from\
    \ one administration of the reading or language arts assessment required under\
    \ paragraph (2); and\n(II)such an English learner\u2019s results on any of the\
    \ assessments required under paragraph (2)(B)(v)(I) or (2)(G) for the first year\
    \ of the English learner\u2019s enrollment in such a school for the purposes of\
    \ the State-determined accountability system under subsection (c); or\n(ii)(I)assess,\
    \ and report the performance of, such an English learner on the reading or language\
    \ arts and mathematics assessments required under paragraph (2)(B)(v)(I) in each\
    \ year of the student\u2019s enrollment in such a school; and\n(II)for the purposes\
    \ of the State-determined accountability system\u2014 (aa)for the first year of\
    \ the student\u2019s enrollment in such a school, exclude the results on the assessments\
    \ described in subclause (I);\n(bb)include a measure of student growth on the\
    \ assessments described in subclause (I) in the second year of the student\u2019\
    s enrollment in such a school; and\n(cc)include proficiency on the assessments\
    \ described in subclause (I) in the third year of the student\u2019s enrollment\
    \ in such a school, and each succeeding year of such enrollment.\n(B)English learner\
    \ subgroupWith respect to a student previously identified as an English learner\
    \ and for not more than 4 years after the student ceases to be identified as an\
    \ English learner, a State may include the results of the student\u2019s assessments\
    \ under paragraph (2)(B)(v)(I) within the English learner subgroup of the subgroups\
    \ of students (as defined in subsection (c)(2)(D)) for the purposes of the State-determined\
    \ accountability system.\n"
